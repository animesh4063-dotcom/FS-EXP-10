name: Backend CI (Spring Boot)

# This tells the robot to run every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Tell GitHub to do all of this inside your backend folder
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Maven Wrapper Executable
      run: chmod +x mvnw

    # Requirement A: Run tests and package the application
    - name: Build with Maven
      run: ./mvnw clean package

    # Requirement B: Save the compiled JAR as a build artifact
    - name: Upload Spring Boot Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar
        retention-days: 5