name: Backend CI (Spring Boot)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # This ensures every command automatically runs inside the backend folder
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x mvnw

    # THE NUCLEAR OPTION: Completely ignores the test folder
    - name: Build with Maven (NO TESTS)
      run: ./mvnw clean package -Dmaven.test.skip=true

    - name: Upload Spring Boot Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        # Since the working directory is backend, we grab the jar directly from target
        path: backend/target/*.jar
        retention-days: 5